<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable | LRMJ Project</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png"
        href="https://res.cloudinary.com/dbugcatig/image/upload/f_auto,q_auto,w_64/LRMJ_EMBLEM_FLAT_DARK_MODE_yhtb4t.png" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f5f3ee; --tx:#0d1f3c; --tx-2:rgba(13,31,60,.6); --red:#c4432f; }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#07101f; --tx:#eef0f5; --tx-2:rgba(238,240,245,.55); --red:#d94f3b; }
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{
      background:var(--bg);color:var(--tx);
      font-family:'DM Sans',system-ui,sans-serif;
      display:flex;align-items:center;justify-content:center;
      min-height:100svh;padding:2rem;text-align:center;
    }
    .e404{display:flex;flex-direction:column;align-items:center;gap:1.5rem;max-width:540px;}
    .e404__emblem{width:96px;height:auto;opacity:.9;filter:drop-shadow(0 0 28px rgba(217,79,59,.18));}
    .e404__code{
      font-family:'Clash Display',sans-serif;
      font-size:clamp(5rem,18vw,9rem);font-weight:500;line-height:1;
      letter-spacing:-.02em;color:var(--tx);
    }
    .e404__title{
      font-family:'Clash Display',sans-serif;
      font-size:clamp(1.5rem,4vw,2.2rem);font-weight:400;line-height:1.2;
    }
    .e404__title em{color:var(--red);font-style:normal;font-weight:500;}
    .e404__text{font-size:.95rem;color:var(--tx-2);line-height:1.6;}
    .e404__link{
      margin-top:.5rem;
      font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
      color:var(--tx);border:1px solid var(--red);
      padding:12px 28px;border-radius:999px;text-decoration:none;
      transition:background-color .35s ease,color .35s ease;
    }
    .e404__link:hover{background:var(--red);color:#fff;}
    .e404__lang{
      position:fixed;top:1.25rem;right:1.25rem;
      display:flex;gap:2px;align-items:center;
      border:1px solid rgba(127,127,127,.3);border-radius:999px;padding:3px 4px;
      font-family:'DM Sans',sans-serif;
    }
    .e404__lang button{
      font-size:.6rem;font-weight:700;letter-spacing:.12em;
      padding:4px 9px;border-radius:999px;
      color:var(--tx-2);background:transparent;border:none;cursor:pointer;
    }
    .e404__lang button.is-active{background:var(--tx);color:var(--bg);}
  </style>
</head>
<body>
  <div class="e404__lang" role="group" aria-label="Langue / Taal">
    <button data-lang="fr" class="is-active" type="button">FR</button>
    <button data-lang="nl" type="button">NL</button>
  </div>
  <main class="e404">
    <img class="e404__emblem"
         src="https://res.cloudinary.com/dbugcatig/image/upload/f_auto,q_auto,w_192/LRMJ_EMBLEM_tyxqhl.png"
         alt="LRMJ Project" width="96" height="96" />
    <div class="e404__code">404</div>
    <h1 class="e404__title" data-fr="Cette page <em>n'existe pas</em>" data-nl="Deze pagina <em>bestaat niet</em>">Cette page <em>n'existe pas</em></h1>
    <p class="e404__text" data-fr="La page recherchée a été déplacée ou n'a jamais existé. Retournez à l'accueil pour découvrir nos réalisations." data-nl="De gezochte pagina is verplaatst of heeft nooit bestaan. Keer terug naar de startpagina om onze realisaties te ontdekken.">La page recherchée a été déplacée ou n'a jamais existé. Retournez à l'accueil pour découvrir nos réalisations.</p>
    <a class="e404__link" href="/" data-fr="Retour à l'accueil" data-nl="Terug naar de startpagina">Retour à l'accueil</a>
  </main>
  <script>
    (function(){
      function apply(lang){
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-'+lang+']').forEach(function(el){
          el.innerHTML = el.getAttribute('data-' + lang);
        });
        document.querySelectorAll('.e404__lang button').forEach(function(b){
          b.classList.toggle('is-active', b.dataset.lang === lang);
        });
        try { localStorage.setItem('lrmj-lang', lang); } catch(_) {}
      }
      var saved;
      try { saved = localStorage.getItem('lrmj-lang'); } catch(_) {}
      var nav = (navigator.language || '').toLowerCase();
      apply(saved || (nav.indexOf('nl') === 0 ? 'nl' : 'fr'));
      document.querySelectorAll('.e404__lang button').forEach(function(b){
        b.addEventListener('click', function(){ apply(b.dataset.lang); });
      });
    })();
  </script>
</body>
</html>
